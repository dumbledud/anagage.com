const stGet = async (k, sh = false) => {
  try {
    const r = await window.storage.get(k, sh);
    return r ? JSON.parse(r.value) : null;
  } catch {
    return null;
  }
};
const stSet = async (k, v, sh = false) => {
  try {
    await window.storage.set(k, JSON.stringify(v), sh);
  } catch (e) {
    console.error('storage set', e);
  }
};
const stList = async (pfx, sh = false) => {
  try {
    const r = await window.storage.list(pfx, sh);
    return r?.keys || [];
  } catch {
    return [];
  }
};
const stDel = async (k, sh = false) => {
  try {
    await window.storage.delete(k, sh);
  } catch {}
};

<script>
// ── ACCESS GATE ────────────────────────────────────────────────────────────
(function() {
  var token = "THERECORD2026";
  var hash = window.location.hash || "";
  var params = new URLSearchParams(hash.slice(1));
  var stored = sessionStorage.getItem("cr_access");
  if (params.get("access") === token || stored === token) {
    sessionStorage.setItem("cr_access", token);
    // Valid — remove hash from URL for cleanliness
    if (params.get("access") === token) {
      history.replaceState(null, "", window.location.pathname);
    }
    return;
  }
  // Show gate
  var gate = document.getElementById("cr-gate");
  var app = document.getElementById("root");
  var loading = document.getElementById("loading");
  if (gate) gate.style.display = "flex";
  if (app) app.style.display = "none";
  if (loading) loading.style.display = "none";
  // Gate submit
  var btn = document.getElementById("cr-gate-btn");
  var inp = document.getElementById("cr-gate-inp");
  var err = document.getElementById("cr-gate-err");
  function check() {
    if (inp && inp.value.trim().toUpperCase() === token) {
      sessionStorage.setItem("cr_access", token);
      if (gate) gate.style.display = "none";
      if (app) { app.style.display = ""; }
      if (loading) loading.style.display = "flex";
    } else {
      if (err) { err.style.display = "block"; }
      if (inp) { inp.value = ""; inp.focus(); }
    }
  }
  if (btn) btn.addEventListener("click", check);
  if (inp) inp.addEventListener("keydown", function(e) { if(e.key==="Enter") check(); });
})();
