// ─── AI CALLS ─────────────────────────────────────────────────────────────
function getKey(){return localStorage.getItem("cgf_api_key")||""}

async function streamAI(sys,user,onChunk){
  const key=getKey();
  if(!key)throw new Error("No API key set. Go to Settings tab.");
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2048,stream:true,system:sys,messages:[{role:"user",content:user}]})
  });
  if(!r.ok){const t=await r.text();throw new Error("HTTP "+r.status+": "+t.slice(0,200))}
  const reader=r.body.getReader(),dec=new TextDecoder();
  let full="",buf="";
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split("\n");buf=lines.pop();
    for(const line of lines){
      if(!line.startsWith("data: "))continue;
      const raw=line.slice(6).trim();
      if(raw==="[DONE]")continue;
      try{
        const evt=JSON.parse(raw);
        if(evt.type==="content_block_delta"&&evt.delta&&evt.delta.text){full+=evt.delta.text;onChunk(full)}
        if(evt.type==="error")throw new Error(evt.error?.message||"Stream error");
      }catch(ex){if(!ex.message?.includes("JSON"))throw ex}
    }
  }
  if(!full)throw new Error("No content streamed");
  return full;
}

async function callAI(sys,user){
  const key=getKey();
  if(!key)throw new Error("No API key set. Go to Settings tab.");
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2048,system:sys,messages:[{role:"user",content:user}]})
  });
  const text=await r.text();
  if(!text)throw new Error("Empty response");
  let data;
  try{data=JSON.parse(text)}catch(ex){throw new Error("Parse failed: "+text.slice(0,120))}
  if(data.error)throw new Error(data.error.message);
  if(!data.content||!data.content[0])throw new Error("No content");
  return data.content[0].text;
}

async function callAIJSON(sys,user){
  const key=getKey();
  if(!key)throw new Error("No API key set. Go to Settings tab.");
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,system:sys,messages:[{role:"user",content:user}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  const txt=(d.content||[]).filter(function(b){return b.type==="text"}).map(function(b){return b.text}).join("").replace(/```json|```/g,"").trim();
  return JSON.parse(txt);
}

function calcScore(harms){return Math.round(harms.reduce(function(s,h){return s+(h.li/100)*(h.sv/100)*(h.pr/100)},0)/harms.length*100)}

function buildBlock(harms){

// Chat Module
function ChatModule(props){
  var _m=useState([]),msgs=_m[0],setMsgs=_m[1];
  var _i=useState(""),inp=_i[0],setInp=_i[1];
  var _l=useState(false),loading=_l[0],setLoading=_l[1];
  var endRef=useRef(null);

  useEffect(function(){if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"})},[msgs]);

  function send(){
    if(!inp.trim()||loading)return;
    var next=msgs.concat([{role:"user",content:inp.trim()}]);
    setMsgs(next);setInp("");setLoading(true);
    var history=next.map(function(m){return m.role+": "+m.content}).join("\n\n");
    callAI(props.sys,history).then(function(reply){
      setMsgs(next.concat([{role:"assistant",content:reply}]));setLoading(false);
    }).catch(function(ex){
      setMsgs(next.concat([{role:"assistant",content:"Error: "+ex.message}]));setLoading(false);
    });
  }

  return e("div",null,
    e("div",{style:{maxHeight:420,overflowY:"auto",marginBottom:12,display:"flex",flexDirection:"column",gap:10}},
      msgs.length===0&&e("div",{style:{color:"var(--dm)",fontSize:13,padding:"8px 0"}},"Start the conversation below."),

        onKeyDown:function(ev){if(ev.key==="Enter"){ev.preventDefault();send()}}}),
      e(Btn,{label:"Send",onPress:send,disabled:loading||!inp.trim(),block:false,variant:"primary",small:true})
    )

}

            placeholder:"sk-ant-...",
            style:{width:"100%",background:"var(--bg)",border:"1px solid var(--bd)",borderRadius:12,
              padding:14,color:"var(--tx)",fontFamily:"'IBM Plex Mono',monospace",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:12}}),
          e(Btn,{label:"Save API Key",onPress:saveKey}),
          e("div",{style:{marginTop:24}},
            e("div",{className:"label",style:{marginBottom:12}},"Data"),
            e(Btn,{label:"Export Data (JSON)",variant:"ghost",onPress:function(){
              var data=JSON.stringify({harms:harms,settlementResult:settlementResult},null,2);
              var blob=new Blob([data],{type:"application/json"});
              var a=document.createElement("a");a.href=URL.createObjectURL(blob);
              a.download="cgf-super-export.json";a.click();
            }}),
            e("div",{style:{marginTop:10}}),
            e(Btn,{label:"Reset All Data",variant:"danger",onPress:function(){
              if(confirm("Reset all data? This cannot be undone.")){
                localStorage.removeItem(SK);
                setHarms(INIT_HARMS);setSettlementResult("");
                setSaveMsg("Reset");setTimeout(function(){setSaveMsg("")},2000);
              }
            }})
          )
        )
      )
    ),

    // Bottom nav
    e("div",{style:{position:"fixed",bottom:0,left:0,right:0,zIndex:100,
      background:"var(--nav)",borderTop:"1px solid var(--bd)",
      display:"flex",padding:"8px 0 max(8px, env(safe-area-inset-bottom))"}},
      PAGES.map(function(p){
        return e("button",{key:p.id,onClick:function(){setPage(p.id)},style:{
          flex:1,display:"flex",flexDirection:"column",alignItems:"center",
          padding:"6px 4px",border:"none",background:"transparent",cursor:"pointer",gap:3}},
          e("span",{style:{fontSize:18,lineHeight:1,color:page===p.id?"var(--gd)":"var(--dm)"}},p.icon),
          e("span",{style:{fontSize:10,letterSpacing:0.5,fontWeight:600,
            color:page===p.id?"var(--gd)":"var(--dm)",textTransform:"uppercase"}},p.label)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
